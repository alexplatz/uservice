name: CI/CD — Deploy to EC2 via OIDC (Podman)
on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04-arm
    env:
      AWS_REGION: us-east-2
      ECR_ACCOUNT: 605262305778
      ECR_REPO_1: uservice-client
      ECR_REPO_2: uservice-api
      ECR_REPO_3: uservice-workers
      # ECR_REPO_4: uservice-client-reverse-proxy
      # ECR_REPO_5: uservice-api-reverse-proxy
      # ECR_REPO_6: uservice-workers-reverse-proxy
      ECR_REPO_7: uservice-meta-reverse-proxy
      EC2_SSH_USER: ec2-user
      EC2_HOST: ec2-3-140-210-11.us-east-2.compute.amazonaws.com
      EC2_SSH_KEY: EC2-DEPLOY-KEY
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Repo .envs
        run: |
          echo "${{ secrets.CLIENT_ENV }}" > apps/client/.env
          echo "${{ secrets.API_ENV }}" > apps/server/.env
          echo "${{ secrets.WORKER_ENV }}" > apps/workers/.env

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::605262305778:role/github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
          echo $TOKEN | docker login --username AWS --password-stdin ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com
          


      ### image builds ###
      
      - name: Build & push client
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml build client
          docker tag localhost/client:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_1}:$GITHUB_SHA
          docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_1}:$GITHUB_SHA

      - name: Build & push api
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml build api
          docker tag localhost/api:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_2}:$GITHUB_SHA
          docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_2}:$GITHUB_SHA

      - name: Build & push workers
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml build workers
          docker tag localhost/workers:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_3}:$GITHUB_SHA
          docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_3}:$GITHUB_SHA


      # - name: Build & push client reverse proxy
      #   env:
      #     GITHUB_SHA: ${{ github.sha }}
      #   run: |
      #     docker compose -f compose.yaml -f compose.prod.yaml build client-reverse-proxy
      #     docker tag localhost/client-reverse-proxy:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_4}:$GITHUB_SHA
      #     docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_4}:$GITHUB_SHA

      # - name: Build & push api reverse proxy
      #   env:
      #     GITHUB_SHA: ${{ github.sha }}
      #   run: |
      #     docker compose -f compose.yaml -f compose.prod.yaml build api-reverse-proxy
      #     docker tag localhost/api-reverse-proxy:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_5}:$GITHUB_SHA
      #     docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_5}:$GITHUB_SHA

      # - name: Build & push workers reverse proxy
      #   env:
      #     GITHUB_SHA: ${{ github.sha }}
      #   run: |
      #     docker compose -f compose.yaml -f compose.prod.yaml build workers-reverse-proxy
      #     docker tag localhost/workers-reverse-proxy:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_6}:$GITHUB_SHA
      #     docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_6}:$GITHUB_SHA

      - name: Build & push workers meta proxy
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          docker compose -f compose.yaml -f compose.prod.yaml build meta-reverse-proxy
          docker tag localhost/meta-reverse-proxy:0.0.1 ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_7}:$GITHUB_SHA
          docker push ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_7}:$GITHUB_SHA

      ### end builds ###



      - name: Copy SSH key
        run: |
          echo "${{ secrets.EC2_DEPLOY_KEY }}" > deploy_key
          chmod 600 deploy_key

      # ensure app directory exists
      - name: Update remote docker-compose
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${AWS_REGION})
          
          ssh -o StrictHostKeyChecking=no -i deploy_key ${EC2_SSH_USER}@${EC2_HOST} "
            cd /home/ec2-user/ &&

            # ensure docker can auth to ECR on the remote (use instance role or local login)
            echo '${ECR_TOKEN}' | docker login --username AWS --password-stdin ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com &&

            docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_1}:${GITHUB_SHA} &&
            docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_2}:${GITHUB_SHA} &&
            docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_3}:${GITHUB_SHA} &&
            # docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_4}:${GITHUB_SHA} &&
            # docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_5}:${GITHUB_SHA} &&
            # docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_6}:${GITHUB_SHA} &&
            docker pull ${ECR_ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_7}:${GITHUB_SHA} &&

            # start/update compose (podman-compose or docker-compose compatible)
            docker compose pull &&
            docker compose up -d
          "

