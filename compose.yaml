services:
  api-reverse-proxy:
    image: caddy:2.11.1
    restart: unless-stopped
    ports:
      # - "80:80"
      # - "9001:443"
      # - "443:443/udp"
      # - "8001:8001"
      # - "9001:8001"
      - "9001:9001"
    volumes:
      - ./infra/api-reverse-proxy/conf:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./apps/server/.env
    # network_mode: host
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: ./infra/Dockerfile.api
    image: localhost/api:0.0.1
    ports:
    - "8001:8001"
    volumes: 
      - ./apps/db/data:/apps/db/data
    develop:
      watch:
        - path: ./apps/server/src
          action: sync
          target: /apps/server/src
        - path: ./apps/server/package.json
          action: rebuild
    command: bun run start
    # network_mode: host
    networks:
      - app-network

  client-reverse-proxy:
    image: caddy:2.11.1
    restart: unless-stopped
    ports:
      # - "80:80"
      # - "9000:443"
      # - "443:443/udp"
      # - "3001:3001"
      # - "9000:3001"
      - "9000:9000"
    volumes:
      - ./infra/client-reverse-proxy/conf:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./apps/client/.env
    # network_mode: host
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: ./infra/Dockerfile.client
    image: localhost/client:0.0.1
    ports:
    - "3001:3001"
    develop:
      watch:
        - path: ./apps/client/src
          action: sync
          target: /apps/client/src
        - path: ./apps/client/package.json
          action: rebuild
    command: bun run start
    # network_mode: host
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:

networks:
  app-network:
    driver: bridge
